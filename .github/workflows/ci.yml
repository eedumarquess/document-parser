name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main
      - 'feat/**'
      - 'fix/**'

permissions:
  contents: read

jobs:
  quality-and-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Lint
        run: corepack pnpm lint

      - name: Typecheck
        run: corepack pnpm typecheck

      - name: Domain tests
        run: corepack pnpm test:domain

      - name: Application tests
        run: corepack pnpm test:application

      - name: E2E tests
        run: corepack pnpm test:e2e
