name: Real Infra Contracts

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1-5'

permissions:
  contents: read

jobs:
  contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Run real infrastructure contract tests
        env:
          RUN_REAL_INFRA_TESTS: 'true'
        run: corepack pnpm test:contracts
